name: submit-search-index

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      webhook_platform:
        description: "Platform webhook notifikasi (auto|slack|discord|teams)"
        required: false
        default: ""

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Kirim sinyal indexing sitemap
        id: indexer
        continue-on-error: true
        env:
          SEARCH_INDEXER_NOTIFY_WEBHOOK: ${{ secrets.SEARCH_INDEXER_NOTIFY_WEBHOOK }}
          SEARCH_INDEXER_NOTIFY_WEBHOOK_PLATFORM: ${{ github.event.inputs.webhook_platform || secrets.SEARCH_INDEXER_NOTIFY_WEBHOOK_PLATFORM || 'auto' }}
        run: |
          set +e
          bash program/search-indexer.sh \
            --timeout 30 \
            --engines google,bing \
            https://notedavidrinaldi.github.io \
            https://notedavidrinaldi.github.io/sitemap.xml
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Alert jika gagal total
        if: ${{ steps.indexer.outputs.exit_code == '2' }}
        env:
          SEARCH_INDEXER_NOTIFY_WEBHOOK: ${{ secrets.SEARCH_INDEXER_NOTIFY_WEBHOOK }}
          SEARCH_INDEXER_NOTIFY_WEBHOOK_PLATFORM: ${{ github.event.inputs.webhook_platform || secrets.SEARCH_INDEXER_NOTIFY_WEBHOOK_PLATFORM || 'auto' }}
        run: |
          if [[ -z "${SEARCH_INDEXER_NOTIFY_WEBHOOK}" ]]; then
            echo "Webhook tidak dikonfigurasi; lewati alert manual."
            exit 0
          fi

          message="search-indexer: workflow ${GITHUB_REPOSITORY} run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} exit=2 (gagal total)"
          message_escaped="$(printf '%s' "$message" | sed -e 's/\\/\\\\/g' -e 's/"/\\\"/g')"
          webhook_platform="${SEARCH_INDEXER_NOTIFY_WEBHOOK_PLATFORM:-auto}"
          if [[ "$webhook_platform" == "auto" ]]; then
            if [[ "$SEARCH_INDEXER_NOTIFY_WEBHOOK" == *"discord.com/api/webhooks"* || "$SEARCH_INDEXER_NOTIFY_WEBHOOK" == *"discordapp.com/api/webhooks"* ]]; then
              webhook_platform="discord"
            elif [[ "$SEARCH_INDEXER_NOTIFY_WEBHOOK" == *"webhook.office.com"* || "$SEARCH_INDEXER_NOTIFY_WEBHOOK" == *"outlook.office.com/webhook"* || "$SEARCH_INDEXER_NOTIFY_WEBHOOK" == *"teams.microsoft.com"* ]]; then
              webhook_platform="teams"
            else
              webhook_platform="slack"
            fi
          fi

          if [[ "$webhook_platform" == "discord" ]]; then
            payload="{\"content\":\"$message_escaped\"}"
          elif [[ "$webhook_platform" == "teams" ]]; then
            payload="{\"@type\":\"MessageCard\",\"@context\":\"https://schema.org/extensions\",\"summary\":\"search-indexer fail\",\"title\":\"search-indexer fail\",\"text\":\"$message_escaped\"}"
          else
            payload="{\"text\":\"$message_escaped\"}"
          fi

          curl -sS -m 10 -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$SEARCH_INDEXER_NOTIFY_WEBHOOK" >/dev/null || true

      - name: Tandai fail jika gagal total
        if: ${{ steps.indexer.outputs.exit_code == '2' }}
        run: |
          echo "search-indexer exit code: 2 (gagal total)"
          exit 1

      - name: Tandai sukses/parcial
        if: ${{ steps.indexer.outputs.exit_code != '2' }}
        run: |
          echo "search-indexer exit code: ${{ steps.indexer.outputs.exit_code }}"
